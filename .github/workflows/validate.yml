name: Validate Policies

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: pip install jsonschema

      - name: Validate policy examples against schema
        run: python scripts/validate_policies.py

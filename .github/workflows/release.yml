name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release bundle
        run: |
          mkdir -p dist
          cp docs/schema-v1.0.json dist/
          cp docs/spec-v1.0.md dist/
          cp -r examples dist/examples
          tar -czf upp-release-${GITHUB_REF_NAME}.tar.gz dist

      - name: Generate checksums
        run: sha256sum upp-release-${GITHUB_REF_NAME}.tar.gz > upp-release-${GITHUB_REF_NAME}.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            upp-release-${{ github.ref_name }}.tar.gz
            upp-release-${{ github.ref_name }}.sha256
